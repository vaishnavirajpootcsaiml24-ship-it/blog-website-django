{% extends 'base.html' %}

{% block title %}{{ post.title }} - My Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card shadow-sm mb-4">
            {% if post.image %}
                <img src="{{ post.image.url }}" class="card-img-top" style="object-fit: cover; max-height: 420px;">
            {% endif %}
            <div class="card-body p-5">
                <h1 class="mb-3">{{ post.title }}</h1>
                <p class="text-muted mb-4">By <strong>{{ post.author.username }}</strong> · {{ post.created_at|date:"F j, Y" }}</p>
                <div class="fs-5 lh-lg">
                    {{ post.content|linebreaksbr }}
                </div>
            </div>
        </div>
        <a href="{% url 'home' %}" class="btn btn-outline-secondary">Back to posts</a>
    </div>
</div>
{% endblock %}
